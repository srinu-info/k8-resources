# replicaset: ensure specified number of same pods running always
# with out replicaset if pods crash no pod will create and app will unavailable
# with replica set if one pod goes down it will create another

appVersion: v1
kind: ReplicaSet
metadata:
  name: nginx
  labels:
    purpose: demo
    environment: dev
spec:
  replicas: 3
  selector:
    matchLabels:
      purpose: demo
      environment: dev
  template:
    metadata:
      labels:
        purpose: demo
        environment: dev
    spec:
      container:
        name: nginx
        image: nginx

